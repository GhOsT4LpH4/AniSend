[package]
name = "anisend"
version = "0.1.0"
edition = "2021"
description = "Livestock auction escrow for Filipino smallholder farmers — a Soroban smart contract that holds USDC in escrow until both buyer and seller confirm delivery."
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
soroban-sdk = "22.0.0"

[dev-dependencies]
soroban-sdk = { version = "22.0.0", features = ["testutils"] }

[profile.release]
opt-level = "z"
overflow-checks = true
debug = 0
strip = "symbols"
debug-assertions = false
panic = "abort"
codegen-units = 1
lto = true

[profile.release-with-logs]
inherits = "release"
debug-assertions = true